# pnpm 11+ no longer reads the `pnpm` field from package.json; settings live
# here instead. esbuild + @tauri-apps/cli ship install-time scripts that need
# to run (native binary extraction); approve them via onlyBuiltDependencies.
# strictDepBuilds=false demotes "unapproved dep build" from error to warning
# so a future dep that adds a build script won't break `pnpm install`.
#
# `packages: []` is here only because pnpm/action-setup's cache lookup runs
# `pnpm store path` which errors with "packages field missing" if this file
# exists without one. We're not actually a workspace, so the list stays empty.
packages: []
onlyBuiltDependencies:
  - esbuild
  - "@tauri-apps/cli"
strictDepBuilds: false